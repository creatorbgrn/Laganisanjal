<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — LaganiSanjal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header id="site-header"></header>

  <section class="section--tight" style="background:#fff;border-bottom:1px solid var(--line)">
    <div class="container">
      <h1 style="font-size:1.9rem">Admin panel</h1>
      <p class="muted" style="margin-top:6px">Review submissions, manage listings and monitor platform activity.</p>
    </div>
  </section>

  <div id="adminGate" class="container" style="padding:48px 20px"></div>

  <main id="adminMain" style="display:none">
    <!-- METRICS -->
    <section class="section--tight">
      <div class="container">
        <div class="stats">
          <div class="stat"><div class="stat__num" id="mBiz">—</div><div class="stat__label">Total businesses</div></div>
          <div class="stat"><div class="stat__num" id="mInv">—</div><div class="stat__label">Total investors</div></div>
          <div class="stat"><div class="stat__num" id="mPending">—</div><div class="stat__label">Pending review</div></div>
          <div class="stat"><div class="stat__num" id="mViews">—</div><div class="stat__label">Page views (30 days)</div></div>
        </div>
        <div class="stats" style="margin-top:20px">
          <div class="stat"><div class="stat__num" id="mApproved">—</div><div class="stat__label">Approved &amp; live</div></div>
          <div class="stat"><div class="stat__num" id="mRejected">—</div><div class="stat__label">Rejected</div></div>
          <div class="stat"><div class="stat__num" id="mFund">—</div><div class="stat__label">Total funding sought (live)</div></div>
          <div class="stat"><div class="stat__num" id="mToday">—</div><div class="stat__label">Visits today</div></div>
        </div>
      </div>
    </section>

    <section class="section--tight">
      <div class="container">
        <div class="grid grid--2">
          <div class="card">
            <h3 style="font-size:1.05rem;margin-bottom:14px">Businesses by industry (live)</h3>
            <div id="byIndustry"><div class="muted">—</div></div>
          </div>
          <div class="card">
            <h3 style="font-size:1.05rem;margin-bottom:14px">Recent activity</h3>
            <div id="recent"><div class="muted">—</div></div>
          </div>
        </div>
      </div>
    </section>

    <!-- MANAGEMENT -->
    <section class="section--tight">
      <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
          <div class="tabs" id="adminTabs">
            <button data-tab="businesses" class="active">Businesses</button>
            <button data-tab="investors">Investors</button>
          </div>
          <div class="tabs" id="statusFilter">
            <button data-status="" class="active">All</button>
            <button data-status="pending">Pending</button>
            <button data-status="approved">Approved</button>
            <button data-status="rejected">Rejected</button>
            <button data-status="removed">Removed</button>
          </div>
        </div>
        <div id="adminList" style="margin-top:20px"><div class="spinner"></div></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
